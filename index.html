<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบสำรวจ: ปัญหาของ AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
  * { font-family: 'Prompt', sans-serif; }
  body { background: linear-gradient(135deg,#0f172a,#1e1b4b,#312e81); min-height:100vh; }
  .hero-grad { background: linear-gradient(135deg,#6366f1,#a855f7,#f472b6); }
  .card { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); backdrop-filter: blur(6px); }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  ::-webkit-scrollbar { width:8px; } ::-webkit-scrollbar-thumb{background:#a855f7; border-radius:4px;}
  textarea::placeholder, input::placeholder { color: rgba(255,255,255,0.4); }
</style>
</head>
<body class="text-white">

<div class="max-w-2xl mx-auto px-4 py-8">

  <header class="hero-grad rounded-2xl py-8 px-6 text-center shadow-lg mb-6 fade-in">
    <span class="text-4xl">⚠️</span>
    <h1 class="text-2xl font-semibold mt-2">แบบสำรวจ: ปัญหาของ AI ในปัจจุบัน</h1>
    <p class="text-white/80 text-sm mt-1">ตอบคำถามและแสดงความคิดเห็นเกี่ยวกับผลกระทบของ AI</p>
  </header>

  <!-- ข้อมูลผู้ตอบ -->
  <div class="card rounded-2xl p-6 mb-4 fade-in">
    <h2 class="text-lg font-medium mb-4 flex items-center gap-2"><span class="material-icons text-purple-300">badge</span> ข้อมูลผู้ตอบแบบสำรวจ</h2>
    <div class="space-y-3">
      <input id="firstName" type="text" placeholder="ชื่อ" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 outline-none focus:border-purple-400">
      <input id="lastName" type="text" placeholder="นามสกุล" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 outline-none focus:border-purple-400">
      <div class="grid grid-cols-2 gap-3">
        <input id="classRoom" type="text" placeholder="ชั้น" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 outline-none focus:border-purple-400">
        <input id="studentNo" type="text" placeholder="เลขที่" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-white/20 outline-none focus:border-purple-400">
      </div>
    </div>
  </div>

  <!-- คำถามปัญหา AI -->
  <div class="card rounded-2xl p-6 mb-4 fade-in">
    <h2 class="text-lg font-medium mb-4 flex items-center gap-2"><span class="material-icons text-pink-300">quiz</span> คำถามเกี่ยวกับปัญหาของ AI</h2>
    <div id="quizArea"></div>
  </div>

  <!-- ความคิดเห็น -->
  <div class="card rounded-2xl p-6 mb-6 fade-in">
    <h2 class="text-lg font-medium mb-3 flex items-center gap-2"><span class="material-icons text-amber-300">chat_bubble</span> ความคิดเห็นเพิ่มเติม</h2>
    <p class="text-white/70 text-sm mb-3">คุณคิดว่าปัญหาที่ร้ายแรงที่สุดของ AI ในปัจจุบันคืออะไร เพราะเหตุใด</p>
    <textarea id="opinion" rows="4" placeholder="พิมพ์ความคิดเห็นของคุณที่นี่..." class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 outline-none focus:border-purple-400 resize-none"></textarea>
  </div>

  <button onclick="submitSurvey()" class="w-full hero-grad py-3 rounded-lg font-medium hover:opacity-90 transition flex items-center justify-center gap-2 mb-10">
    <span class="material-icons text-lg">send</span> ส่งแบบสำรวจ
  </button>

  <footer class="text-center text-white/40 text-xs pb-6 border-t border-white/10 pt-6">
    © 2025 อบรม Ai กับทีมวิทยากร คณะศึกษาศาสตร์ มข.
  </footer>

</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfYpuAB-ETb9FXe4hIMUqlrz1YC6QntIhe7Vujhxq7SxcFSJzzLNJ3BhnXHMGt_zFh/exec";

const quizData = [
  {q:"ข้อใดคือปัญหาด้าน \"ความลำเอียง\" (Bias) ของ AI?", options:["AI ตัดสินใจโดยอิงข้อมูลที่มีอคติแฝงอยู่ ทำให้ผลลัพธ์ไม่เป็นธรรม","AI ทำงานช้ากว่ามนุษย์","AI ใช้ไฟฟ้ามากเกินไป"], answer:0},
  {q:"Deepfake คือปัญหาด้านใดของ AI?", options:["การประหยัดพลังงาน","การปลอมแปลงภาพ/เสียง/วิดีโอจนแยกไม่ออกจากของจริง","ความเร็วในการประมวลผล"], answer:1},
  {q:"ข้อกังวลเรื่อง \"การแทนที่แรงงาน\" หมายถึงอะไร?", options:["AI อาจทำให้บางอาชีพลดความต้องการแรงงานมนุษย์ลง","AI ทำให้คนมีงานทำมากขึ้นทุกสาขา","AI ไม่เกี่ยวกับตลาดแรงงาน"], answer:0},
  {q:"ปัญหาด้าน \"ความเป็นส่วนตัว\" (Privacy) ของ AI คือข้อใด?", options:["AI อาจเก็บและใช้ข้อมูลส่วนบุคคลโดยเจ้าของข้อมูลไม่ยินยอม","AI ช่วยปกป้องข้อมูลได้ 100%","AI ไม่เก็บข้อมูลใดๆ เลย"], answer:0},
  {q:"เหตุใดข้อมูลเท็จ (Misinformation) จาก AI จึงเป็นปัญหาสำคัญ?", options:["เพราะ AI สร้างเนื้อหาที่ดูน่าเชื่อถือได้ง่าย ทำให้คนหลงเชื่อข้อมูลผิดๆ","เพราะ AI สร้างข้อมูลได้ช้ามาก","เพราะ AI ไม่สามารถสร้างข้อความได้"], answer:0}
];

function initQuiz() {
  const area = document.getElementById('quizArea');
  area.innerHTML = quizData.map((item,i) => `
    <div class="mb-4 bg-white/5 rounded-xl p-4">
      <p class="font-medium mb-2 text-sm">${i+1}. ${item.q}</p>
      ${item.options.map((op,j) => `
        <label class="flex items-center gap-2 mb-1 cursor-pointer">
          <input type="radio" name="q${i}" value="${j}" class="accent-purple-400">
          <span class="text-white/80 text-sm">${op}</span>
        </label>`).join('')}
    </div>`).join('');
}
initQuiz();

function sendToSheet(payload) {
  return new Promise((resolve) => {
    const cbName = "cb_" + Date.now();
    window[cbName] = function(res) {
      resolve(res);
      delete window[cbName];
      document.body.removeChild(script);
    };
    const params = new URLSearchParams(Object.assign({ action: "save", callback: cbName }, payload));
    const script = document.createElement("script");
    script.src = APPS_SCRIPT_URL + "?" + params.toString();
    script.onerror = () => { resolve({status:"error", message:"เชื่อมต่อไม่สำเร็จ"}); };
    document.body.appendChild(script);
  });
}

async function submitSurvey() {
  const firstName = document.getElementById('firstName').value.trim();
  const lastName = document.getElementById('lastName').value.trim();
  const classRoom = document.getElementById('classRoom').value.trim();
  const studentNo = document.getElementById('studentNo').value.trim();
  const opinion = document.getElementById('opinion').value.trim();

  if (!firstName || !lastName || !classRoom || !studentNo) {
    Swal.fire({icon:'warning', title:'กรอกข้อมูลไม่ครบ', text:'กรุณากรอกชื่อ นามสกุล ชั้น เลขที่ให้ครบ', background:'#1e1b4b', color:'#fff'});
    return;
  }

  let unanswered = false;
  let score = 0;
  quizData.forEach((item,i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) unanswered = true;
    else if (parseInt(selected.value) === item.answer) score++;
  });

  if (unanswered) {
    Swal.fire({icon:'warning', title:'ตอบคำถามไม่ครบ', text:'กรุณาตอบคำถามทุกข้อก่อนส่ง', background:'#1e1b4b', color:'#fff'});
    return;
  }

  if (!opinion) {
    Swal.fire({icon:'warning', title:'ยังไม่ได้แสดงความคิดเห็น', text:'กรุณากรอกความคิดเห็นก่อนส่ง', background:'#1e1b4b', color:'#fff'});
    return;
  }

  Swal.fire({title:'กำลังส่งข้อมูล...', allowOutsideClick:false, background:'#1e1b4b', color:'#fff', didOpen:() => Swal.showLoading()});

  const res = await sendToSheet({
    firstName, lastName, studentNo, classRoom,
    activity: "survey_ai_problems",
    score, maxScore: quizData.length,
    opinion
  });

  Swal.fire({
    icon: res && res.status === 'success' ? 'success' : 'error',
    title: res && res.status === 'success' ? 'ส่งแบบสำรวจสำเร็จ' : 'ส่งไม่สำเร็จ',
    text: res && res.status === 'success' ? `บันทึกข้อมูลเรียบร้อยแล้ว (ตอบถูก ${score}/${quizData.length} ข้อ)` : 'กรุณาลองใหม่อีกครั้ง',
    background:'#1e1b4b', color:'#fff'
  });
}
</script>
</body>
</html>
